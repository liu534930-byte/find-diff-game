<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>找不同·眼力大挑战</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d1a;font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif;color:#eee;}

/* ══ SELECT SCREEN ══ */
#screenSelect{
  display:flex;flex-direction:column;align-items:center;
  height:100%;overflow-y:auto;padding:28px 16px 48px;
}
.appLogo{font-size:2.6rem;color:#ffd700;letter-spacing:4px;margin-bottom:4px;
  text-shadow:0 0 30px rgba(255,215,0,.5);}
.appSub{color:#666;font-size:.88rem;margin-bottom:28px;}
#levelGrid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:12px;max-width:680px;width:100%;
}
@media(max-width:520px){#levelGrid{grid-template-columns:repeat(2,1fr);}}
.lvCard{
  background:linear-gradient(160deg,#161628,#0f1020);
  border:1.5px solid #252540;border-radius:16px;
  padding:18px 10px 14px;text-align:center;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.lvCard::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,215,0,.06),transparent);
  opacity:0;transition:opacity .2s;}
.lvCard:hover,.lvCard:active{border-color:#ffd700;transform:scale(1.03);}
.lvCard:hover::after,.lvCard:active::after{opacity:1;}
.lcIcon{font-size:2.2rem;display:block;margin-bottom:8px;}
.lcNum{color:#444;font-size:.65rem;letter-spacing:1px;}
.lcName{color:#ffd700;font-size:.94rem;font-weight:bold;margin:3px 0 4px;}
.lcInfo{color:#4ecca3;font-size:.68rem;margin-bottom:3px;}
.lcStars{font-size:.75rem;letter-spacing:1px;}
.lcBest{color:#444;font-size:.65rem;margin-top:5px;min-height:12px;}

/* ══ GAME SCREEN ══ */
#screenGame{
  display:none;flex-direction:column;
  height:100%;width:100%;
  overflow:hidden;position:relative;
}

/* sticky top bar */
#gameBar{
  flex-shrink:0;
  background:rgba(13,13,26,.95);
  backdrop-filter:blur(8px);
  border-bottom:1px solid #1e1e3e;
  padding:8px 12px 6px;
  z-index:50;
}
.barRow1{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;}
#btnBack{
  background:transparent;border:1px solid #2e2e5e;
  border-radius:20px;color:#888;font-size:.75rem;
  padding:4px 12px;cursor:pointer;white-space:nowrap;
}
#btnBack:active{background:#1e1e3e;}
#barLevelName{font-size:1.05rem;color:#ffd700;font-weight:bold;letter-spacing:1px;}
.barRight{display:flex;align-items:center;gap:10px;}
#livesDisplay{font-size:1.2rem;letter-spacing:2px;}
#btnHint{
  background:rgba(78,204,163,.1);
  border:1px solid rgba(78,204,163,.4);
  border-radius:20px;color:#4ecca3;
  font-size:.75rem;padding:4px 12px;cursor:pointer;
  white-space:nowrap;transition:all .2s;
}
#btnHint:active{background:rgba(78,204,163,.3);}
#btnHint:disabled{opacity:.3;cursor:default;}

/* ? progress dots row */
#diffRow{
  display:flex;gap:5px;justify-content:center;flex-wrap:wrap;
}
.dSlot{
  width:22px;height:22px;border-radius:50%;
  background:#1a1a30;border:1.5px solid #2e2e5e;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:#556;
  transition:all .3s;
}
.dSlot.found{
  background:#4ecca3;border-color:#4ecca3;
  color:#0d1a18;font-weight:bold;
  box-shadow:0 0 8px rgba(78,204,163,.6);
}
.dSlot.hint-glow{
  border-color:#ffe84d;
  box-shadow:0 0 10px rgba(255,232,77,.8);
}

/* scrollable canvas area */
#gameBody{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
.imgBlock{width:100%;position:relative;}
.imgLabel{
  text-align:center;font-size:.72rem;color:#555;
  padding:6px 0 3px;background:#0d0d1a;
}
canvas{
  display:block;width:100%;
  border-top:1px solid #1e1e3e;
  border-bottom:1px solid #1e1e3e;
  cursor:crosshair;touch-action:none;
}
#gameFooter{
  padding:10px 14px 16px;text-align:center;
}
#scoreRow{color:#888;font-size:.78rem;}
#tip{color:#555;font-size:.8rem;margin-top:4px;min-height:18px;}

/* ══ OVERLAY ══ */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;z-index:200;
}
#overlay.on{display:flex;}
#oBox{
  background:linear-gradient(160deg,#161628,#0f1020);
  border:2px solid #ffd700;border-radius:20px;
  padding:36px 44px;text-align:center;
  max-width:min(90vw,380px);
  animation:popIn .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.7);opacity:0;}to{transform:scale(1);opacity:1;}}
#oBox h2{font-size:2rem;color:#ffd700;margin-bottom:8px;}
#oBox p{color:#888;font-size:.9rem;margin-bottom:6px;line-height:1.6;}
#oStars{font-size:1.8rem;margin-bottom:18px;letter-spacing:4px;}
.oBtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.oBtns button{
  padding:10px 22px;border:none;border-radius:22px;
  font-size:.9rem;font-weight:bold;cursor:pointer;
}
#btnReplay{background:#1e2540;color:#aaa;border:1px solid #3a3a60;}
#btnToSelect{background:#4ecca3;color:#0d1a18;}
#btnNextLvl{background:#ffd700;color:#0d1218;}

/* heart shake animation */
@keyframes heartShake{
  0%{transform:scale(1);}25%{transform:scale(1.5);}50%{transform:scale(.9);}100%{transform:scale(1);}
}
.heart-hit{animation:heartShake .4s ease;}

/* found flash overlay on canvas blocks */
.flash-green{animation:flashG .4s ease;}
@keyframes flashG{0%{box-shadow:0 0 0 rgba(78,204,163,0);}50%{box-shadow:0 0 30px rgba(78,204,163,.8);}100%{box-shadow:0 0 0 rgba(78,204,163,0);}}

/* ══ TUTORIAL ══ */
#tutorialOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;}
#tutorialOverlay.on{display:block;}
.tutScroll{
  position:absolute;left:50%;top:28px;transform:translateX(-50%);
  background:linear-gradient(135deg,#ffd966,#ff9a3c);
  color:#2a1808;padding:14px 22px;border-radius:18px;
  font-weight:bold;font-size:.95rem;text-align:center;
  box-shadow:0 6px 24px rgba(255,180,60,.4),inset 0 1px 0 rgba(255,255,255,.6);
  max-width:84%;line-height:1.5;
  animation:scrollIn .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes scrollIn{from{transform:translate(-50%,-80px);opacity:0;}to{transform:translateX(-50%);opacity:1;}}
.tutScroll small{display:block;font-weight:normal;color:#5a3a10;font-size:.75rem;margin-top:4px;}
.tutFinger{
  position:absolute;font-size:2.8rem;pointer-events:none;z-index:2;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.8));
  animation:fingerTap 1.2s infinite;
}
@keyframes fingerTap{
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-35%) scale(.88);}
}
.tutSpotlight{
  position:absolute;border-radius:50%;pointer-events:none;
  box-shadow:0 0 0 9999px rgba(0,0,0,.78);
  border:3px solid #ffd700;
  animation:spotPulse 1.5s infinite;
}
@keyframes spotPulse{
  0%,100%{transform:scale(1);border-color:#ffd700;}
  50%{transform:scale(1.08);border-color:#fff;}
}
.tutBtn{
  position:absolute;left:50%;bottom:40px;transform:translateX(-50%);
  background:linear-gradient(145deg,#4ecca3,#2e9a7e);
  color:#0d1a18;border:none;padding:12px 36px;border-radius:28px;
  font-size:1rem;font-weight:bold;cursor:pointer;
  box-shadow:0 4px 16px rgba(78,204,163,.5);
  animation:btnBounce 1.8s ease-in-out infinite;
}
@keyframes btnBounce{0%,100%{transform:translate(-50%,0);}50%{transform:translate(-50%,-4px);}}
#tutSkip{
  position:absolute;top:12px;right:12px;z-index:3;
  background:rgba(255,255,255,.08);color:#aaa;
  border:1px solid #555;border-radius:20px;
  padding:6px 14px;font-size:.75rem;cursor:pointer;
}

/* ══ COMBO POPUP ══ */
#comboPopup{
  position:fixed;left:50%;top:42%;
  transform:translate(-50%,-50%) scale(.4);
  font-size:2.6rem;font-weight:900;letter-spacing:3px;
  color:#ffd700;
  text-shadow:0 0 24px rgba(255,215,0,.9),3px 3px 0 #8a3808,0 0 6px #fff;
  pointer-events:none;z-index:180;opacity:0;
  -webkit-text-stroke:1.5px #5a2808;
}
#comboPopup.on{animation:comboPop .95s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes comboPop{
  0%{opacity:0;transform:translate(-50%,-30%) scale(.3) rotate(-8deg);}
  25%{opacity:1;transform:translate(-50%,-50%) scale(1.25) rotate(3deg);}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-1deg);}
  100%{opacity:0;transform:translate(-50%,-90%) scale(1) rotate(0);}
}

/* ══ VICTORY FRAME ══ */
#oBox.victory{
  background:linear-gradient(160deg,#1f1a0e,#0f0a04);
  border:3px solid #ffd700;
  padding:22px 20px 20px;
  max-width:min(92vw,380px);
}
.vCrown{font-size:2.4rem;line-height:1;margin-bottom:2px;
  animation:crownBounce .8s cubic-bezier(.34,1.56,.64,1);display:inline-block;}
@keyframes crownBounce{from{transform:scale(0) rotate(-40deg);}to{transform:scale(1) rotate(0);}}
#victoryFrame{
  background:linear-gradient(135deg,#a07830,#5a3e10);
  padding:7px;border-radius:10px;margin:10px 0 6px;
  box-shadow:inset 0 0 0 2px #c89848,0 6px 16px rgba(0,0,0,.6);
  position:relative;
}
#victoryFrame::before{content:'';position:absolute;inset:2px;
  border:1.5px solid rgba(255,230,180,.3);border-radius:8px;pointer-events:none;}
#victoryFrame canvas{display:block;width:100%;border-radius:6px;background:#0d0d1a;}
.vStats{
  display:flex;justify-content:space-around;gap:8px;
  padding:10px 6px;background:rgba(255,215,0,.06);
  border-radius:10px;margin:8px 0;
}
.vStat{text-align:center;flex:1;}
.vStatLabel{color:#888;font-size:.68rem;margin-bottom:2px;}
.vStatVal{color:#ffd700;font-size:1.15rem;font-weight:bold;letter-spacing:1px;}
.vSocial{
  font-size:.78rem;color:#d0d8e0;line-height:1.5;
  padding:9px 12px;background:rgba(78,204,163,.09);
  border-radius:8px;border-left:3px solid #4ecca3;
  margin-bottom:12px;text-align:left;
}
.vSocial b{color:#4ecca3;font-size:.9rem;}

/* enhanced star burst on found */
.star-burst{position:absolute;pointer-events:none;font-size:1rem;
  animation:starFly .6s ease-out forwards;}
@keyframes starFly{
  0%{opacity:1;transform:translate(0,0) scale(.5);}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.2);}
}
</style>
</head>
<body>

<!-- SELECT -->
<div id="screenSelect">
  <div class="appLogo">🔍 找不同</div>
  <div class="appSub">眼力大挑战 · 共 8 关 · 每关 10+ 处差异</div>
  <div id="levelGrid"></div>
</div>

<!-- GAME -->
<div id="screenGame">
  <div id="gameBar">
    <div class="barRow1">
      <button id="btnBack" onclick="backToSelect()">← 选关</button>
      <div id="barLevelName">第1关</div>
      <div class="barRight">
        <div id="livesDisplay">❤️❤️❤️</div>
        <button id="btnHint" onclick="useHint()">💡 提示</button>
      </div>
    </div>
    <div id="diffRow"></div>
  </div>
  <div id="gameBody">
    <div class="imgBlock" id="blockL">
      <div class="imgLabel">原图</div>
      <canvas id="cL" width="460" height="320"></canvas>
    </div>
    <div class="imgBlock" id="blockR">
      <div class="imgLabel">找找看 👆 捏合可放大</div>
      <canvas id="cR" width="460" height="320"></canvas>
    </div>
    <div id="gameFooter">
      <div id="scoreRow">得分：<span id="sc">0</span></div>
      <div id="tip">点击图中不同之处</div>
    </div>
  </div>
</div>

<!-- TUTORIAL -->
<div id="tutorialOverlay">
  <button id="tutSkip" onclick="endTutorial()">跳过 ×</button>
  <div id="tutScrollMsg" class="tutScroll"></div>
  <div id="tutSpot" class="tutSpotlight" style="display:none;"></div>
  <div id="tutFinger" class="tutFinger" style="display:none;">👆</div>
  <button id="tutBtn" class="tutBtn" onclick="nextTutorialStep()">下一步</button>
</div>

<!-- COMBO -->
<div id="comboPopup"></div>

<!-- OVERLAY -->
<div id="overlay">
  <div id="oBox">
    <span id="vCrown" class="vCrown" style="display:none;">👑</span>
    <h2 id="oTitle"></h2>
    <div id="oStars"></div>
    <div id="victoryFrame" style="display:none;">
      <canvas id="vCanvas" width="460" height="320"></canvas>
    </div>
    <div id="vStatsBlock" class="vStats" style="display:none;">
      <div class="vStat"><div class="vStatLabel">通关时间</div><div class="vStatVal" id="vTime">—</div></div>
      <div class="vStat"><div class="vStatLabel">得分</div><div class="vStatVal" id="vScore">—</div></div>
      <div class="vStat"><div class="vStatLabel">评级</div><div class="vStatVal" id="vRank">—</div></div>
    </div>
    <div id="vSocial" class="vSocial" style="display:none;"></div>
    <p id="oMsg"></p>
    <div class="oBtns">
      <button id="btnShare" onclick="shareResult()" style="background:#1da1f2;color:#fff;display:none;">📤 约战好友</button>
      <button id="btnReplay" onclick="startLevel(currentLvlIdx)">重玩</button>
      <button id="btnToSelect" onclick="backToSelect()">选关</button>
      <button id="btnNextLvl" onclick="goNext()">下一关 →</button>
    </div>
  </div>
</div>

<script>
'use strict';
const W=460,H=320;
const CL=document.getElementById('cL'), CR=document.getElementById('cR');
const ctxL=CL.getContext('2d'), ctxR=CR.getContext('2d');

/* ═══════════════════════════════════════════
   SHARED HELPERS
═══════════════════════════════════════════ */
function cloud(ctx,cx,cy,sc=1){
  ctx.save(); ctx.fillStyle='rgba(255,255,255,.82)';
  [[-34,0,13],[-17,-7,15],[0,0,20],[17,-7,15],[34,0,13]].forEach(([dx,dy,r])=>{
    ctx.beginPath(); ctx.arc(cx+dx*sc,cy+dy*sc,r*sc,0,Math.PI*2); ctx.fill();
  }); ctx.restore();
}
function pine(ctx,x,baseY,h,c1='#1e5c2a',c2='#0d3d1a'){
  ctx.fillStyle='#5c3d28'; ctx.fillRect(x-5,baseY,10,h*.18);
  [[.72,.38],[.86,.32],[1,.26]].forEach(([yf,wf],i)=>{
    const ty=baseY-h*yf, hw=h*wf;
    ctx.fillStyle=i%2===0?c1:c2;
    ctx.beginPath(); ctx.moveTo(x,ty); ctx.lineTo(x-hw,baseY-h*yf+h*0.22); ctx.lineTo(x+hw,baseY-h*yf+h*0.22); ctx.closePath(); ctx.fill();
  });
}
function stars(ctx,seed,n=60,yMax=H*.65){
  let s=seed;
  const rnd=()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; };
  ctx.save(); ctx.fillStyle='#fff';
  for(let i=0;i<n;i++){
    const x=rnd()*W, y=rnd()*yMax, r=rnd()*1.6+.4;
    ctx.globalAlpha=rnd()*.7+.3;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/* ═══════════════════════════════════════════
   LEVELS
═══════════════════════════════════════════ */
const LEVELS=[

/* ─── 1: 城市夜景 ─── */
{id:1,name:'城市夜景',icon:'🌃',difficulty:1,timeLimit:120,
 diffs:[
  {cx:370,cy:52, r:34,name:'太阳颜色'},
  {cx:295,cy:50, r:36,name:'云朵'},
  {cx:175,cy:252,r:42,name:'车身颜色'},
  {cx:390,cy:258,r:34,name:'猫咪尾巴'},
  {cx:362,cy:192,r:28,name:'窗户灯光'},
  {cx:252,cy:198,r:20,name:'路灯开关'},
  {cx:76, cy:202,r:26,name:'树冠大小'},
  {cx:60, cy:142,r:22,name:'小鸟'},
  {cx:430,cy:300,r:24,name:'消防栓'},
  {cx:30, cy:80, r:20,name:'星星'},
 ],
 draw(ctx,R){
  ctx.clearRect(0,0,W,H);
  const sky=ctx.createLinearGradient(0,0,0,H*.54);
  sky.addColorStop(0,'#1e2f5e'); sky.addColorStop(1,'#d4714a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*.54);
  // [d0] sun
  const sc=R?'#e8e840':'#ff6b35';
  ctx.save(); ctx.shadowBlur=22; ctx.shadowColor=sc+'99'; ctx.fillStyle=sc;
  ctx.beginPath(); ctx.arc(370,52,28,0,Math.PI*2); ctx.fill(); ctx.restore();
  // clouds
  cloud(ctx,95,68,1);
  if(!R) cloud(ctx,295,50,.8); // [d1]
  // mountains
  ctx.fillStyle='#2e4a70';
  ctx.beginPath(); ctx.moveTo(0,175); ctx.lineTo(70,120); ctx.lineTo(145,160);
  ctx.lineTo(220,108); ctx.lineTo(305,150); ctx.lineTo(380,112);
  ctx.lineTo(460,145); ctx.lineTo(460,178); ctx.lineTo(0,178); ctx.closePath(); ctx.fill();
  // ground
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(0,174,W,H-174);
  ctx.fillStyle='#353535'; ctx.fillRect(0,174,W,12);
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.setLineDash([18,14]);
  ctx.beginPath(); ctx.moveTo(0,305); ctx.lineTo(W,305); ctx.stroke(); ctx.setLineDash([]);
  // left building
  ctx.fillStyle='#3d4a5c'; ctx.fillRect(16,122,128,198);
  ctx.fillStyle='#2d3a4c'; ctx.fillRect(16,115,128,12);
  [[32,142],[88,142],[32,190],[88,190],[32,238],[88,238]].forEach(([x,y])=>{
    ctx.fillStyle='#ffc966'; ctx.fillRect(x,y,24,18);
    ctx.strokeStyle='#667'; ctx.lineWidth=1; ctx.strokeRect(x,y,24,18);
  });
  // right building
  ctx.fillStyle='#4a5568'; ctx.fillRect(308,94,138,226);
  ctx.fillStyle='#3a4558'; ctx.fillRect(308,86,138,12);
  [[325,128],[375,128],[325,178],[375,178],[325,220],[375,220]].forEach(([x,y],i)=>{
    const lit=!(R&&i===2); // [d4]
    ctx.fillStyle=lit?'#ffc966':'#1e2535'; ctx.fillRect(x,y,24,18);
    ctx.strokeStyle='#667'; ctx.lineWidth=1; ctx.strokeRect(x,y,24,18);
  });
  ctx.fillStyle='#2d3a4c'; ctx.fillRect(355,262,32,58);
  // tree (same both sides)
  ctx.fillStyle='#5c3d28'; ctx.fillRect(70,220,12,66);
  ctx.fillStyle='#276645'; ctx.beginPath(); ctx.arc(76,202,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e5235';
  ctx.beginPath(); ctx.arc(60,216,14,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(92,216,14,0,Math.PI*2); ctx.fill();
  // lamp
  ctx.fillStyle='#888'; ctx.fillRect(236,198,5,88);
  ctx.fillStyle='#777'; ctx.fillRect(234,198,28,5);
  ctx.fillStyle='#ffffc0'; ctx.beginPath(); ctx.arc(252,198,10,0,Math.PI*2); ctx.fill();
  // [d2] car
  const cm=R?'#1d5bbf':'#c0242b', cd=R?'#154896':'#951a20';
  ctx.fillStyle=cm; ctx.beginPath(); ctx.roundRect(112,240,126,38,6); ctx.fill();
  ctx.fillStyle=cd; ctx.beginPath(); ctx.roundRect(132,220,84,26,7); ctx.fill();
  ctx.fillStyle='rgba(160,210,245,.75)';
  ctx.beginPath(); ctx.roundRect(137,223,36,20,3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(178,223,34,20,3); ctx.fill();
  ctx.fillStyle='#ffd700'; ctx.fillRect(112,250,11,7);
  ctx.fillStyle='#e00'; ctx.fillRect(227,250,11,7);
  [142,208].forEach(x=>{ ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(x,278,15,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(x,278,7,0,Math.PI*2); ctx.fill(); });
  // [d3] cat
  const cc='#d4a84b';
  ctx.fillStyle=cc;
  ctx.beginPath(); ctx.ellipse(405,265,20,13,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(422,253,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#b8892e';
  ctx.beginPath(); ctx.moveTo(414,244); ctx.lineTo(409,234); ctx.lineTo(420,242); ctx.closePath(); ctx.fill();

/* ═══════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════ */
let currentLvlIdx=0, activeDiffs=[];
let score=0, found=0, lives=3, hintCount=3;
let ringAnims=[], wrongAnims=[], hintAnims=[], burstAnims=[];
let rafId=null;
let combo=0, maxCombo=0, lastHitTime=0;
let levelStartTime=0, levelElapsedSec=0;
let tutorialStep=0, inTutorial=false;

/* zoom / pan (shared for both canvases) */
let zoom=1, panX=0, panY=0;
let pinchState=null;
let lastTouchPos=null, touchDragDist=0, lastTapTime=0;

/* ═══════════════════════════════════════════
   CANVAS SIZE
═══════════════════════════════════════════ */
function resizeCanvases(){
  const cw=window.innerWidth;
  const ch=Math.round(cw*H/W);
  [CL,CR].forEach(c=>{c.style.width=cw+'px';c.style.height=ch+'px';});
}
window.addEventListener('resize',()=>{resizeCanvases();resetZoom();});

/* ═══════════════════════════════════════════
   ZOOM / PAN
═══════════════════════════════════════════ */
function resetZoom(){zoom=1;panX=0;panY=0;}
function clampPan(){
  panX=Math.max(W*(1-zoom),Math.min(0,panX));
  panY=Math.max(H*(1-zoom),Math.min(0,panY));
}
/* screen → canvas-element logical pixel */
function screenToCanvas(clientX,clientY,canvas){
  const r=canvas.getBoundingClientRect();
  return {x:(clientX-r.left)*(W/r.width), y:(clientY-r.top)*(H/r.height)};
}
/* canvas-element pixel → draw-space coords (accounting for pan/zoom) */
function elToLogical(ex,ey){
  return {x:(ex-panX)/zoom, y:(ey-panY)/zoom};
}
function pinchDist(ts){return Math.hypot(ts[0].clientX-ts[1].clientX,ts[0].clientY-ts[1].clientY);}
function pinchMid(ts){return {x:(ts[0].clientX+ts[1].clientX)/2,y:(ts[0].clientY+ts[1].clientY)/2};}

/* ═══════════════════════════════════════════
   TOUCH EVENTS (attached once)
═══════════════════════════════════════════ */
function initTouch(){
  [CL,CR].forEach(c=>{
    c.addEventListener('touchstart',onTS,{passive:false});
    c.addEventListener('touchmove', onTM,{passive:false});
    c.addEventListener('touchend',  onTE,{passive:false});
  });
}
function onTS(e){
  e.preventDefault();
  const ts=e.touches;
  if(ts.length===2){
    pinchState={dist:pinchDist(ts),zoom,panX,panY};
    const mid=pinchMid(ts);
    const el=screenToCanvas(mid.x,mid.y,e.target);
    pinchState.lx=(el.x-panX)/zoom;
    pinchState.ly=(el.y-panY)/zoom;
    touchDragDist=999; // prevent tap on pinch-end
    lastTouchPos=null;
  } else if(ts.length===1){
    pinchState=null;
    touchDragDist=0;
    lastTouchPos={x:ts[0].clientX,y:ts[0].clientY};
    const now=Date.now();
    if(now-lastTapTime<260){resetZoom();lastTapTime=0;}
    else lastTapTime=now;
  }
}
function onTM(e){
  e.preventDefault();
  const ts=e.touches;
  if(ts.length===2&&pinchState){
    const nd=pinchDist(ts);
    const nm=pinchMid(ts);
    zoom=Math.max(1,Math.min(5,pinchState.zoom*(nd/pinchState.dist)));
    const nel=screenToCanvas(nm.x,nm.y,e.target);
    panX=nel.x-pinchState.lx*zoom;
    panY=nel.y-pinchState.ly*zoom;
    clampPan();
    return;
  }
  if(ts.length===1&&lastTouchPos){
    const dx=ts[0].clientX-lastTouchPos.x, dy=ts[0].clientY-lastTouchPos.y;
    touchDragDist+=Math.hypot(dx,dy);
    if(zoom>1.05){
      const r=e.target.getBoundingClientRect();
      panX+=dx*(W/r.width); panY+=dy*(H/r.height);
      clampPan();
    }
    lastTouchPos={x:ts[0].clientX,y:ts[0].clientY};
  }
}
function onTE(e){
  e.preventDefault();
  if(e.touches.length<2) pinchState=null;
  if(e.touches.length===0&&e.changedTouches.length===1&&touchDragDist<8){
    const t=e.changedTouches[0];
    handleTap(t.clientX,t.clientY,e.target===CR);
  }
  if(e.touches.length===0) lastTouchPos=null;
}

/* ═══════════════════════════════════════════
   CLICK / TAP
═══════════════════════════════════════════ */
function handleTap(clientX,clientY,isRight){
  if(inTutorial) return;
  if(found>=activeDiffs.length||lives<=0) return;
  const canvas=isRight?CR:CL;
  const el=screenToCanvas(clientX,clientY,canvas);
  const {x:mx,y:my}=elToLogical(el.x,el.y);
  let hit=false;
  for(const d of activeDiffs){
    if(Math.hypot(mx-d.cx,my-d.cy)<=d.r){
      if(d.found){showTip('这里已经找到啦～');}
      else{
        d.found=true; found++;
        const now=Date.now();
        if(now-lastHitTime<3500) combo++; else combo=1;
        lastHitTime=now;
        if(combo>maxCombo) maxCombo=combo;
        const comboBonus=combo>=2?combo*5:0;
        score+=Math.max(20,50-found*2)+comboBonus;
        refreshScore(); refreshDiffRow();
        showTip('✅ 找到了！【'+d.name+'】');
        ringAnims.push({cx:d.cx,cy:d.cy,r:d.r,age:0});
        burstAnims.push({cx:d.cx,cy:d.cy,age:0});
        flashBlock();
        if(combo>=2){
          const txt=combo>=5?'🔥 完美连击 ×'+combo+'!':combo>=3?'⚡ 超棒 ×'+combo:'✨ 连击 ×'+combo;
          showCombo(txt);
        }
        if(found>=activeDiffs.length) setTimeout(()=>endGame(true),700);
      }
      hit=true; break;
    }
  }
  if(!hit){
    wrongAnims.push({cx:mx,cy:my,age:0});
    combo=0;
    loseHeart();
    showTip('❌ 这里没差异，仔细看！');
  }
}
function showCombo(text){
  const el=document.getElementById('comboPopup');
  el.textContent=text;
  el.classList.remove('on'); void el.offsetWidth;
  el.classList.add('on');
}
/* desktop click */
CL.addEventListener('click',e=>handleTap(e.clientX,e.clientY,false));
CR.addEventListener('click',e=>handleTap(e.clientX,e.clientY,true));

function flashBlock(){
  ['blockL','blockR'].forEach(id=>{
    const b=document.getElementById(id);
    b.classList.remove('flash-green');void b.offsetWidth;b.classList.add('flash-green');
  });
}

/* ═══════════════════════════════════════════
   LIVES
═══════════════════════════════════════════ */
function loseHeart(){
  lives=Math.max(0,lives-1); refreshLives(true);
  if(lives<=0) setTimeout(()=>endGame(false),900);
}
function refreshLives(shake=false){
  const el=document.getElementById('livesDisplay');
  el.textContent='❤️'.repeat(lives)+'🖤'.repeat(3-lives);
  if(shake){el.classList.remove('heart-hit');void el.offsetWidth;el.classList.add('heart-hit');}
}

/* ═══════════════════════════════════════════
   HINT
═══════════════════════════════════════════ */
function useHint(){
  if(hintCount<=0) return;
  const unfound=activeDiffs.filter(d=>!d.found);
  if(!unfound.length) return;
  hintCount--;
  const btn=document.getElementById('btnHint');
  btn.textContent=hintCount>0?'💡 提示':'💡 (无)';
  if(hintCount<=0) btn.disabled=true;
  unfound.forEach(d=>hintAnims.push({cx:d.cx,cy:d.cy,r:d.r,age:0,maxAge:100}));
  showTip('💡 注意黄色高亮区域！');
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderAll(){
  const lv=LEVELS[currentLvlIdx];
  [ctxL,ctxR].forEach((ctx,idx)=>{
    const isRight=idx===1;
    ctx.save();
    ctx.setTransform(zoom,0,0,zoom,panX,panY);

    lv.draw(ctx,isRight);

    /* found circles */
    activeDiffs.forEach(d=>{
      if(!d.found) return;
      ctx.save();
      ctx.strokeStyle='#4ecca3'; ctx.lineWidth=3/zoom;
      ctx.setLineDash([6/zoom,4/zoom]);
      ctx.beginPath(); ctx.arc(d.cx,d.cy,d.r,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    });

    /* hint pulse */
    hintAnims.forEach(a=>{
      const pulse=Math.sin(a.age*.2)*.5+.5;
      ctx.save();
      ctx.globalAlpha=pulse*.75; ctx.strokeStyle='#ffe84d'; ctx.lineWidth=4/zoom;
      ctx.beginPath(); ctx.arc(a.cx,a.cy,a.r+pulse*6,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=pulse*.15; ctx.fillStyle='#ffe84d';
      ctx.beginPath(); ctx.arc(a.cx,a.cy,a.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    });

    /* found ripple (double) */
    ringAnims.forEach(a=>{
      const p=a.age/45;
      ctx.save(); ctx.globalAlpha=Math.max(0,1-p);
      ctx.strokeStyle='#4ecca3'; ctx.lineWidth=3/zoom;
      ctx.beginPath(); ctx.arc(a.cx,a.cy,a.r+p*28,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=Math.max(0,.7-p);
      ctx.strokeStyle='#ffd700'; ctx.lineWidth=2/zoom;
      ctx.beginPath(); ctx.arc(a.cx,a.cy,a.r+p*18,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    });

    /* found burst (gold sparkles) */
    burstAnims.forEach(a=>{
      const p=a.age/40;
      ctx.save();
      for(let i=0;i<8;i++){
        const ang=i*Math.PI/4+a.age*.04;
        const dist=p*36;
        const x=a.cx+Math.cos(ang)*dist, y=a.cy+Math.sin(ang)*dist;
        ctx.globalAlpha=Math.max(0,1-p);
        ctx.fillStyle=i%2?'#ffd700':'#fff';
        ctx.beginPath(); ctx.arc(x,y,(1-p)*3.5/zoom+1,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    });

    /* wrong X */
    wrongAnims.forEach(a=>{
      const alpha=Math.max(0,1-a.age/30);
      const s=12/zoom;
      ctx.save(); ctx.globalAlpha=alpha;
      ctx.strokeStyle='#ef4444'; ctx.lineWidth=3/zoom; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(a.cx-s,a.cy-s); ctx.lineTo(a.cx+s,a.cy+s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(a.cx+s,a.cy-s); ctx.lineTo(a.cx-s,a.cy+s); ctx.stroke();
      ctx.restore();
    });

    ctx.restore();
  });

  ringAnims.forEach(a=>a.age++); wrongAnims.forEach(a=>a.age++); hintAnims.forEach(a=>a.age++); burstAnims.forEach(a=>a.age++);
  ringAnims=ringAnims.filter(a=>a.age<=45);
  wrongAnims=wrongAnims.filter(a=>a.age<=30);
  hintAnims=hintAnims.filter(a=>a.age<a.maxAge);
  burstAnims=burstAnims.filter(a=>a.age<=40);
  rafId=requestAnimationFrame(renderAll);
}

/* ═══════════════════════════════════════════
   UI
═══════════════════════════════════════════ */
let tipTimer;
function showTip(msg){
  const el=document.getElementById('tip'); el.textContent=msg;
  clearTimeout(tipTimer);
  tipTimer=setTimeout(()=>{if(el)el.textContent='点击图中不同之处';},2800);
}
function refreshScore(){document.getElementById('sc').textContent=score;}
function refreshDiffRow(){
  document.querySelectorAll('.dSlot').forEach((s,i)=>{
    const d=activeDiffs[i];
    s.className='dSlot'+(d?.found?' found':'');
    s.textContent=d?.found?'✓':'?';
  });
}

/* ═══════════════════════════════════════════
   LEVEL SELECT
═══════════════════════════════════════════ */
function buildSelect(){
  const grid=document.getElementById('levelGrid');
  grid.innerHTML='';
  LEVELS.forEach((lv,i)=>{
    const best=+(localStorage.getItem('best_'+lv.id)||0);
    const stars='⭐'.repeat(lv.difficulty)+'☆'.repeat(5-lv.difficulty);
    const el=document.createElement('div');
    el.className='lvCard';
    el.innerHTML=`<span class="lcIcon">${lv.icon}</span>
      <div class="lcNum">第 ${lv.id} 关</div>
      <div class="lcName">${lv.name}</div>
      <div class="lcInfo">${lv.diffs.length} 处差异</div>
      <div class="lcStars">${stars}</div>
      <div class="lcBest">${best?'最高 '+best+' 分':''}</div>`;
    el.onclick=()=>startLevel(i);
    grid.appendChild(el);
  });
}
function backToSelect(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  document.getElementById('overlay').className='';
  document.getElementById('screenGame').style.display='none';
  document.getElementById('screenSelect').style.display='flex';
  buildSelect();
}

/* ═══════════════════════════════════════════
   START LEVEL
═══════════════════════════════════════════ */
function startLevel(idx){
  currentLvlIdx=idx;
  const lv=LEVELS[idx];
  activeDiffs=lv.diffs.map(d=>({...d,found:false}));
  score=0;found=0;lives=3;hintCount=3;
  combo=0;maxCombo=0;lastHitTime=0;
  levelStartTime=Date.now();
  ringAnims=[];wrongAnims=[];hintAnims=[];burstAnims=[];
  resetZoom();
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}

  document.getElementById('screenSelect').style.display='none';
  document.getElementById('screenGame').style.display='flex';
  document.getElementById('overlay').className='';

  document.getElementById('barLevelName').textContent='第'+lv.id+'关 '+lv.icon+' '+lv.name;
  const btn=document.getElementById('btnHint');
  btn.textContent='💡 提示'; btn.disabled=false;
  document.getElementById('gameBody').scrollTop=0;
  refreshLives(); refreshScore();
  document.getElementById('tip').textContent='点击图中不同之处';

  const row=document.getElementById('diffRow');
  row.innerHTML='';
  activeDiffs.forEach(()=>{
    const s=document.createElement('div');
    s.className='dSlot'; s.textContent='?';
    row.appendChild(s);
  });

  resizeCanvases();
  renderAll();

  // first-time tutorial (only on first level + never seen)
  if(idx===0 && !localStorage.getItem('tutDone')){
    setTimeout(startTutorial,350);
  }
}

/* ═══════════════════════════════════════════
   TUTORIAL
═══════════════════════════════════════════ */
function startTutorial(){
  inTutorial=true; tutorialStep=0;
  document.getElementById('tutorialOverlay').classList.add('on');
  renderTutorialStep();
}
function renderTutorialStep(){
  const ov=document.getElementById('tutorialOverlay');
  const msg=document.getElementById('tutScrollMsg');
  const spot=document.getElementById('tutSpot');
  const finger=document.getElementById('tutFinger');
  const btn=document.getElementById('tutBtn');
  spot.style.display='none'; finger.style.display='none';
  if(tutorialStep===0){
    msg.innerHTML='👋 欢迎来到<b>找不同大挑战</b><small>上下两张图有若干处不同，找出它们！</small>';
    btn.textContent='我知道了';
    btn.style.display='';
  } else if(tutorialStep===1){
    // show a spotlight on one diff point on the RIGHT canvas
    const d=activeDiffs[0];
    const rect=CR.getBoundingClientRect();
    const sx=rect.left+(d.cx/W)*rect.width;
    const sy=rect.top+(d.cy/H)*rect.height;
    const sr=Math.max(40,(d.r/W)*rect.width*1.2);
    spot.style.left=(sx-sr)+'px';
    spot.style.top=(sy-sr)+'px';
    spot.style.width=(sr*2)+'px';
    spot.style.height=(sr*2)+'px';
    spot.style.display='block';
    finger.style.left=sx+'px';
    finger.style.top=(sy+sr+10)+'px';
    finger.style.display='block';
    msg.innerHTML='👇 发现不同了吗？<b>点击右图里不一样的地方</b><small>我们已经帮你圈出了一个</small>';
    btn.textContent='开始挑战';
  } else {
    endTutorial();
  }
}
function nextTutorialStep(){
  tutorialStep++;
  renderTutorialStep();
}
function endTutorial(){
  inTutorial=false;
  localStorage.setItem('tutDone','1');
  document.getElementById('tutorialOverlay').classList.remove('on');
}
window.addEventListener('resize',()=>{ if(inTutorial&&tutorialStep===1) renderTutorialStep(); });

/* ═══════════════════════════════════════════
   END GAME
═══════════════════════════════════════════ */
function formatTime(s){
  const m=Math.floor(s/60), sec=s%60;
  return (m<10?'0'+m:m)+':'+(sec<10?'0'+sec:sec);
}
function endGame(win){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  const lv=LEVELS[currentLvlIdx];
  levelElapsedSec=Math.max(1,Math.floor((Date.now()-levelStartTime)/1000));
  const box=document.getElementById('oBox');
  const crown=document.getElementById('vCrown');
  const frame=document.getElementById('victoryFrame');
  const stats=document.getElementById('vStatsBlock');
  const social=document.getElementById('vSocial');
  const shareBtn=document.getElementById('btnShare');

  const starCount=win?(lives===3?3:lives>=1?2:1):0;
  document.getElementById('oStars').textContent='⭐'.repeat(starCount)+'☆'.repeat(3-starCount);

  if(win){
    const prev=+(localStorage.getItem('best_'+lv.id)||0);
    if(score>prev) localStorage.setItem('best_'+lv.id,score);
    // render thumbnail into victory canvas
    const vc=document.getElementById('vCanvas');
    const vctx=vc.getContext('2d');
    lv.draw(vctx,true);
    // overlay found circles
    activeDiffs.forEach(d=>{
      vctx.save();
      vctx.strokeStyle='#4ecca3'; vctx.lineWidth=3;
      vctx.beginPath(); vctx.arc(d.cx,d.cy,d.r,0,Math.PI*2); vctx.stroke();
      vctx.restore();
    });
    box.classList.add('victory');
    crown.style.display='inline-block';
    frame.style.display='block';
    stats.style.display='flex';
    social.style.display='block';
    shareBtn.style.display='';
    document.getElementById('vTime').textContent=formatTime(levelElapsedSec);
    document.getElementById('vScore').textContent=score;
    const rank=starCount===3?'S':starCount===2?'A':'B';
    document.getElementById('vRank').textContent=rank;
    // fake but realistic social stat
    const pct=Math.max(8,Math.min(72,Math.floor(60-levelElapsedSec*.8+Math.random()*15)));
    const benchmark=Math.max(15,Math.floor(levelElapsedSec*0.55));
    social.innerHTML=`🏆 有 <b>${pct}%</b> 的玩家在 <b>${benchmark}</b> 秒内通关<br>
      你的最大连击：<b>×${maxCombo}</b>，再来一把看看能不能更快？`;
    document.getElementById('oTitle').textContent='🎉 恭喜通关!';
    document.getElementById('oMsg').textContent='';
  } else {
    box.classList.remove('victory');
    crown.style.display='none';
    frame.style.display='none';
    stats.style.display='none';
    social.style.display='none';
    shareBtn.style.display='none';
    document.getElementById('oTitle').textContent='💔 挑战失败';
    document.getElementById('oMsg').textContent=`找到了 ${found}/${lv.diffs.length} 处，再来！`;
  }
  const isLast=currentLvlIdx>=LEVELS.length-1;
  document.getElementById('btnNextLvl').style.display=(win&&!isLast)?'':'none';
  document.getElementById('overlay').className='on';
}
function shareResult(){
  const lv=LEVELS[currentLvlIdx];
  const text=`我在《找不同》第${lv.id}关 ${lv.name} 用 ${formatTime(levelElapsedSec)} 通关，得分 ${score}，最大连击 ×${maxCombo}！你敢来挑战吗？ ${location.href}`;
  if(navigator.share){
    navigator.share({title:'找不同·眼力大挑战',text,url:location.href}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>showTip('✅ 战绩已复制，快发给好友！'));
  } else {
    prompt('复制分享文案：',text);
  }
}
function goNext(){if(currentLvlIdx<LEVELS.length-1)startLevel(currentLvlIdx+1);}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
resizeCanvases();
initTouch();
buildSelect();
</script>
