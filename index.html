<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔍 找不同</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0d1a; min-height:100vh; font-family:'PingFang SC','Microsoft YaHei',Arial,sans-serif; color:#eee; overflow-x:hidden; padding-bottom:env(safe-area-inset-bottom,0px); }

/* ── SELECT ── */
#screenSelect { display:flex; flex-direction:column; align-items:center; padding:28px 16px 50px; }
.appTitle { font-size:2.4rem; color:#ffd700; letter-spacing:5px; margin-bottom:6px; text-shadow:0 0 30px rgba(255,215,0,.45); }
.appSub { color:#777; font-size:.9rem; margin-bottom:30px; }
#levelGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; max-width:680px; width:100%; }
@media(max-width:520px){ #levelGrid{ grid-template-columns:repeat(2,1fr); } }
.levelCard { background:linear-gradient(160deg,#1a1a2e,#16213e); border:2px solid #2a2a4a; border-radius:14px; padding:18px 10px 14px; text-align:center; cursor:pointer; transition:all .22s; }
.levelCard:hover { border-color:#ffd700; transform:translateY(-3px); box-shadow:0 8px 24px rgba(255,215,0,.18); }
.cIcon { font-size:2rem; display:block; margin-bottom:7px; }
.cNum { color:#555; font-size:.68rem; letter-spacing:1px; }
.cName { color:#ffd700; font-size:.96rem; font-weight:bold; margin:3px 0; }
.cInfo { color:#4ecca3; font-size:.7rem; margin-bottom:3px; }
.cStars { font-size:.78rem; }
.cBest { color:#555; font-size:.68rem; margin-top:5px; min-height:13px; }

/* ── GAME ── */
#screenGame { display:none; flex-direction:column; align-items:center; padding:10px 8px 20px; }
#gameTop { width:100%; }
.gHeader { display:flex; align-items:center; gap:10px; margin-bottom:6px; flex-wrap:wrap; justify-content:center; }
#gameTitle { font-size:1.25rem; color:#ffd700; letter-spacing:2px; }
#btnBack { padding:4px 12px; background:transparent; border:1px solid #444; border-radius:16px; color:#888; font-size:.78rem; cursor:pointer; }
#btnBack:hover { border-color:#888; color:#ccc; }
#hud { display:flex; align-items:center; gap:16px; margin-bottom:8px; flex-wrap:wrap; justify-content:center; }
.hb { text-align:center; min-width:46px; }
.hl { color:#555; font-size:.68rem; }
.hv { color:#ffd700; font-size:1.22rem; font-weight:bold; }
#btnHint { padding:5px 15px; background:rgba(78,204,163,.12); border:1px solid rgba(78,204,163,.45); border-radius:20px; color:#4ecca3; font-size:.8rem; cursor:pointer; white-space:nowrap; transition:all .2s; }
#btnHint:hover:not(:disabled) { background:rgba(78,204,163,.28); }
#btnHint:disabled { opacity:.35; cursor:default; }
#boards { display:flex; gap:10px; align-items:flex-start; justify-content:center; }
.col { display:flex; flex-direction:column; align-items:center; gap:4px; }
.col span { color:#777; font-size:.75rem; }
canvas { border:2px solid #2e2e4e; border-radius:8px; cursor:crosshair; display:block; width:460px; height:320px; max-width:calc(50vw - 12px); }
#dots { display:flex; gap:7px; margin-top:8px; flex-wrap:wrap; justify-content:center; }
.dot { width:18px; height:18px; border-radius:50%; background:#1a1a2e; border:2px solid #333; transition:all .35s; }
.dot.ok { background:#4ecca3; border-color:#4ecca3; box-shadow:0 0 8px rgba(78,204,163,.55); }
#tip { color:#666; font-size:.83rem; margin-top:6px; min-height:19px; text-align:center; }
/* ── MOBILE: 全宽画布 + 顶部悬浮 HUD + 自然滚动 ── */
@media(max-width:600px){
  #screenGame { padding:0 0 env(safe-area-inset-bottom,16px); align-items:stretch; }
  #gameTop {
    position:sticky; top:0; z-index:50;
    background:#0d0d1a;
    border-bottom:1px solid #1e1e3e;
    padding:8px 10px 6px;
  }
  .gHeader { margin-bottom:4px; gap:8px; justify-content:flex-start; }
  #gameTitle { font-size:1rem; letter-spacing:1px; }
  #btnBack { font-size:.72rem; padding:3px 10px; }
  #hud { gap:0; margin-bottom:0; justify-content:space-between; width:100%; }
  .hb { min-width:0; flex:1; }
  .hl { font-size:.58rem; }
  .hv { font-size:.95rem; }
  #btnHint { font-size:.7rem; padding:4px 10px; flex-shrink:0; }
  /* 画布全宽，边到边 */
  #boards { flex-direction:column; gap:0; width:100%; }
  .col { width:100%; gap:0; }
  .col span { font-size:.72rem; padding:6px 0 3px; background:#0d0d1a; display:block; text-align:center; }
  canvas { border-radius:0; border-left:none; border-right:none; width:100% !important; }
  #dots { margin-top:10px; gap:8px; padding:0 12px; }
  .dot { width:16px; height:16px; }
  #tip { font-size:.8rem; margin-top:5px; padding:0 12px 12px; }
}

/* ── OVERLAY ── */
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.82); align-items:center; justify-content:center; z-index:200; }
#overlay.on { display:flex; }
#oBox { background:linear-gradient(160deg,#1a1a2e,#16213e); border:2px solid #ffd700; border-radius:18px; padding:34px 48px; text-align:center; max-width:min(92vw,420px); }
#oBox h2 { font-size:2rem; color:#ffd700; margin-bottom:10px; }
#oBox p { color:#999; font-size:.92rem; margin-bottom:22px; line-height:1.65; }
.oBtns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
.oBtns button { padding:9px 22px; border:none; border-radius:22px; font-size:.9rem; font-weight:bold; cursor:pointer; transition:opacity .18s; }
.oBtns button:hover { opacity:.82; }
#btnReplay { background:#2a3550; color:#aaa; border:1px solid #445; }
#btnToSelect { background:#4ecca3; color:#1a1a2e; }
#btnNextLvl { background:#ffd700; color:#1a1a2e; }
</style>
</head>
<body>

<div id="screenSelect">
  <div class="appTitle">🔍 找不同</div>
  <div class="appSub">共 8 关，主题各异，越往后越难——你能全破吗？</div>
  <div id="levelGrid"></div>
</div>

<div id="screenGame">
  <div id="gameTop">
    <div class="gHeader">
      <button id="btnBack" onclick="backToSelect()">← 选关</button>
      <div id="gameTitle"></div>
    </div>
    <div id="hud">
      <div class="hb"><div class="hl">关卡</div><div class="hv" id="hudLvl">1/8</div></div>
      <div class="hb"><div class="hl">已找到</div><div class="hv"><span id="fc">0</span>/<span id="ft">5</span></div></div>
      <div class="hb"><div class="hl">剩余时间</div><div class="hv" id="tm">120</div></div>
      <div class="hb"><div class="hl">得分</div><div class="hv" id="sc">0</div></div>
      <button id="btnHint" onclick="useHint()">💡 提示 (<span id="hintLeft">3</span>)</button>
    </div>
  </div>
  <div id="boards">
    <div class="col"><span>原图</span><canvas id="cL" width="460" height="320"></canvas></div>
    <div class="col"><span>找找看</span><canvas id="cR" width="460" height="320"></canvas></div>
  </div>
  <div id="dots"></div>
  <div id="tip">点击任意一张图的不同之处</div>
</div>

<div id="overlay">
  <div id="oBox">
    <h2 id="oTitle"></h2>
    <p id="oMsg"></p>
    <div class="oBtns">
      <button id="btnReplay" onclick="startLevel(currentLvlIdx)">重玩</button>
      <button id="btnToSelect" onclick="backToSelect()">选关</button>
      <button id="btnNextLvl" onclick="goNext()">下一关 →</button>
    </div>
  </div>
</div>

<script>
'use strict';
const W=460,H=320;
const CL=document.getElementById('cL'), CR=document.getElementById('cR');
const ctxL=CL.getContext('2d'), ctxR=CR.getContext('2d');

/* ═══════════════════════════════════════════
   SHARED HELPERS
═══════════════════════════════════════════ */
function cloud(ctx,cx,cy,sc=1){
  ctx.save(); ctx.fillStyle='rgba(255,255,255,.82)';
  [[-34,0,13],[-17,-7,15],[0,0,20],[17,-7,15],[34,0,13]].forEach(([dx,dy,r])=>{
    ctx.beginPath(); ctx.arc(cx+dx*sc,cy+dy*sc,r*sc,0,Math.PI*2); ctx.fill();
  }); ctx.restore();
}
function pine(ctx,x,baseY,h,c1='#1e5c2a',c2='#0d3d1a'){
  ctx.fillStyle='#5c3d28'; ctx.fillRect(x-5,baseY,10,h*.18);
  [[.72,.38],[.86,.32],[1,.26]].forEach(([yf,wf],i)=>{
    const ty=baseY-h*yf, hw=h*wf;
    ctx.fillStyle=i%2===0?c1:c2;
    ctx.beginPath(); ctx.moveTo(x,ty); ctx.lineTo(x-hw,baseY-h*yf+h*0.22); ctx.lineTo(x+hw,baseY-h*yf+h*0.22); ctx.closePath(); ctx.fill();
  });
}
function stars(ctx,seed,n=60,yMax=H*.65){
  let s=seed;
  const rnd=()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; };
  ctx.save(); ctx.fillStyle='#fff';
  for(let i=0;i<n;i++){
    const x=rnd()*W, y=rnd()*yMax, r=rnd()*1.6+.4;
    ctx.globalAlpha=rnd()*.7+.3;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

/* ═══════════════════════════════════════════
   LEVELS
═══════════════════════════════════════════ */
const LEVELS=[

/* ─── 1: 城市夜景 ─── */
{id:1,name:'城市夜景',icon:'🌃',difficulty:1,timeLimit:120,
 diffs:[
  {cx:370,cy:52, r:34,name:'太阳颜色'},
  {cx:295,cy:50, r:36,name:'云朵'},
  {cx:175,cy:252,r:42,name:'车身颜色'},
  {cx:390,cy:258,r:34,name:'猫咪尾巴'},
  {cx:362,cy:192,r:28,name:'窗户灯光'},
 ],
 draw(ctx,R){
  ctx.clearRect(0,0,W,H);
  const sky=ctx.createLinearGradient(0,0,0,H*.54);
  sky.addColorStop(0,'#1e2f5e'); sky.addColorStop(1,'#d4714a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*.54);
  // [d0] sun
  const sc=R?'#e8e840':'#ff6b35';
  ctx.save(); ctx.shadowBlur=22; ctx.shadowColor=sc+'99'; ctx.fillStyle=sc;
  ctx.beginPath(); ctx.arc(370,52,28,0,Math.PI*2); ctx.fill(); ctx.restore();
  // clouds
  cloud(ctx,95,68,1);
  if(!R) cloud(ctx,295,50,.8); // [d1]
  // mountains
  ctx.fillStyle='#2e4a70';
  ctx.beginPath(); ctx.moveTo(0,175); ctx.lineTo(70,120); ctx.lineTo(145,160);
  ctx.lineTo(220,108); ctx.lineTo(305,150); ctx.lineTo(380,112);
  ctx.lineTo(460,145); ctx.lineTo(460,178); ctx.lineTo(0,178); ctx.closePath(); ctx.fill();
  // ground
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(0,174,W,H-174);
  ctx.fillStyle='#353535'; ctx.fillRect(0,174,W,12);
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.setLineDash([18,14]);
  ctx.beginPath(); ctx.moveTo(0,305); ctx.lineTo(W,305); ctx.stroke(); ctx.setLineDash([]);
  // left building
  ctx.fillStyle='#3d4a5c'; ctx.fillRect(16,122,128,198);
  ctx.fillStyle='#2d3a4c'; ctx.fillRect(16,115,128,12);
  [[32,142],[88,142],[32,190],[88,190],[32,238],[88,238]].forEach(([x,y])=>{
    ctx.fillStyle='#ffc966'; ctx.fillRect(x,y,24,18);
    ctx.strokeStyle='#667'; ctx.lineWidth=1; ctx.strokeRect(x,y,24,18);
  });
  // right building
  ctx.fillStyle='#4a5568'; ctx.fillRect(308,94,138,226);
  ctx.fillStyle='#3a4558'; ctx.fillRect(308,86,138,12);
  [[325,128],[375,128],[325,178],[375,178],[325,220],[375,220]].forEach(([x,y],i)=>{
    const lit=!(R&&i===2); // [d4]
    ctx.fillStyle=lit?'#ffc966':'#1e2535'; ctx.fillRect(x,y,24,18);
    ctx.strokeStyle='#667'; ctx.lineWidth=1; ctx.strokeRect(x,y,24,18);
  });
  ctx.fillStyle='#2d3a4c'; ctx.fillRect(355,262,32,58);
  // tree (same both sides)
  ctx.fillStyle='#5c3d28'; ctx.fillRect(70,220,12,66);
  ctx.fillStyle='#276645'; ctx.beginPath(); ctx.arc(76,202,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1e5235';
  ctx.beginPath(); ctx.arc(60,216,14,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(92,216,14,0,Math.PI*2); ctx.fill();
  // lamp
  ctx.fillStyle='#888'; ctx.fillRect(236,198,5,88);
  ctx.fillStyle='#777'; ctx.fillRect(234,198,28,5);
  ctx.fillStyle='#ffffc0'; ctx.beginPath(); ctx.arc(252,198,10,0,Math.PI*2); ctx.fill();
  // [d2] car
  const cm=R?'#1d5bbf':'#c0242b', cd=R?'#154896':'#951a20';
  ctx.fillStyle=cm; ctx.beginPath(); ctx.roundRect(112,240,126,38,6); ctx.fill();
  ctx.fillStyle=cd; ctx.beginPath(); ctx.roundRect(132,220,84,26,7); ctx.fill();
  ctx.fillStyle='rgba(160,210,245,.75)';
  ctx.beginPath(); ctx.roundRect(137,223,36,20,3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(178,223,34,20,3); ctx.fill();
  ctx.fillStyle='#ffd700'; ctx.fillRect(112,250,11,7);
  ctx.fillStyle='#e00'; ctx.fillRect(227,250,11,7);
  [142,208].forEach(x=>{ ctx.fillStyle='#1a1a1a'; ctx.beginPath(); ctx.arc(x,278,15,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#555'; ctx.beginPath(); ctx.arc(x,278,7,0,Math.PI*2); ctx.fill(); });
  // [d3] cat
  const cc='#d4a84b';
  ctx.fillStyle=cc;
  ctx.beginPath(); ctx.ellipse(405,265,20,13,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(422,253,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#b8892e';
  ctx.beginPath(); ctx.moveTo(414,244); ctx.lineTo(409,234); ctx.lineTo(420,242); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(429,244); ctx.lineTo(435,234); ctx.lineTo(424,242); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(418,252,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(427,252,2,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#ccc'; ctx.lineWidth=.8;
  [[411,257,400,254],[411,259,398,259],[411,261,400,264],[432,257,443,254],[432,259,445,259],[432,261,443,264]].forEach(([x1,y1,x2,y2])=>{ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); });
  ctx.fillStyle=cc; [[393,270],[401,270],[409,270],[417,270]].forEach(([x,y])=>ctx.fillRect(x,y,6,12));
  if(!R){ ctx.strokeStyle=cc; ctx.lineWidth=5; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(386,265); ctx.quadraticCurveTo(368,248,374,232); ctx.stroke(); }
 }
},

/* ─── 2: 沙滩假日 ─── */
{id:2,name:'沙滩假日',icon:'🏖️',difficulty:1,timeLimit:105,
 diffs:[
  {cx:170,cy:205,r:32,name:'遮阳伞颜色'},
  {cx:200,cy:58, r:35,name:'云朵'},
  {cx:378,cy:142,r:30,name:'帆船帆色'},
  {cx:368,cy:268,r:24,name:'螃蟹'},
  {cx:78, cy:168,r:28,name:'椰子数量'},
 ],
 draw(ctx,R){
  ctx.clearRect(0,0,W,H);
  // sky
  const sky=ctx.createLinearGradient(0,0,0,H*.55);
  sky.addColorStop(0,'#1e90d0'); sky.addColorStop(1,'#87ceeb');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*.55);
  // sun
  ctx.save(); ctx.fillStyle='#ffe44d'; ctx.shadowBlur=28; ctx.shadowColor='#ffe44d88';
  ctx.beginPath(); ctx.arc(415,55,30,0,Math.PI*2); ctx.fill(); ctx.restore();
  // [d1] cloud
  if(!R) cloud(ctx,200,58,1);
  cloud(ctx,310,42,.75);
  // sea
  const sea=ctx.createLinearGradient(0,H*.55,0,H*.78);
  sea.addColorStop(0,'#1ca3c4'); sea.addColorStop(1,'#0d7a9e');
  ctx.fillStyle=sea; ctx.fillRect(0,H*.55,W,H*.23);
  // waves
  ctx.strokeStyle='rgba(255,255,255,.3)'; ctx.lineWidth=2;
  [180,195,210].forEach(y=>{ ctx.beginPath(); for(let x=0;x<W;x+=40){ ctx.moveTo(x,y); ctx.quadraticCurveTo(x+10,y-5,x+20,y); } ctx.stroke(); });
  // sand
  const sand=ctx.createLinearGradient(0,H*.77,0,H);
  sand.addColorStop(0,'#d4aa60'); sand.addColorStop(1,'#c49040');
  ctx.fillStyle=sand; ctx.fillRect(0,H*.77,W,H*.23);
  // [d2] sailboat
  const sailCol=R?'#ffd700':'#f5f5f5';
  ctx.fillStyle='#8B5E3C'; ctx.fillRect(344,168,68,16); // hull
  ctx.fillStyle='#654321'; ctx.fillRect(377,118,4,55); // mast
  ctx.fillStyle=sailCol;
  ctx.beginPath(); ctx.moveTo(381,118); ctx.lineTo(410,160); ctx.lineTo(381,160); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(377,120); ctx.lineTo(350,158); ctx.lineTo(377,158); ctx.closePath(); ctx.fill();
  // palm tree
  ctx.fillStyle='#7a5c2e'; ctx.fillRect(74,190,8,105);
  // [d4] coconuts: left=2, right=1
  ctx.fillStyle='#5a3e1b';
  ctx.beginPath(); ctx.arc(72,183,8,0,Math.PI*2); ctx.fill();
  if(!R){ ctx.beginPath(); ctx.arc(85,178,8,0,Math.PI*2); ctx.fill(); }
  // palm fronds
  const fr=[[78,165,40,145],[78,165,55,155],[78,165,100,148],[78,165,50,175],[78,165,110,162]];
  ctx.strokeStyle='#2e7d32'; ctx.lineWidth=4; ctx.lineCap='round';
  fr.forEach(([x1,y1,x2,y2])=>{ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); });
  // [d0] umbrella stripes
  const u1=R?'#1d5bbf':'#d42b2b', u2=R?'#3d7fe0':'#ff6b6b';
  ctx.save(); ctx.translate(170,170); ctx.rotate(-0.1);
  for(let i=0;i<8;i++){
    ctx.fillStyle=i%2===0?u1:u2;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,60,i*Math.PI/4,(i+1)*Math.PI/4); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='#ddd'; ctx.beginPath(); ctx.arc(0,0,8,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.fillStyle='#888'; ctx.fillRect(168,168,4,80); // pole
  // beach chair
  ctx.fillStyle='#e0c070'; ctx.fillRect(200,225,50,8); // seat
  ctx.fillStyle='#e0c070'; ctx.fillRect(200,225,8,30); ctx.fillRect(242,225,8,30);
  ctx.fillStyle='#c8a858'; ctx.fillRect(195,212,55,16); ctx.roundRect?ctx.beginPath():void 0;
  // [d3] crab
  if(!R){
    ctx.fillStyle='#d95f2b';
    ctx.beginPath(); ctx.ellipse(368,270,18,12,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(358,260,7,5,-.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(380,260,7,5,.4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#d95f2b'; ctx.lineWidth=2;
    [[355,272,345,265],[360,274,348,272],[375,272,385,265],[372,274,384,272]].forEach(([x1,y1,x2,y2])=>{ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); });
    ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(363,268,2,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(373,268,2,0,Math.PI*2); ctx.fill();
  }
  // seashells
  ctx.fillStyle='#f0d070';
  [[120,275],[150,280],[280,270],[310,278]].forEach(([x,y])=>{ ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill(); });
 }
},

/* ─── 3: 森林木屋 ─── */
{id:3,name:'森林木屋',icon:'🌲',difficulty:2,timeLimit:90,
 diffs:[
  {cx:388,cy:52, r:30,name:'月亮形状'},
  {cx:230,cy:172,r:32,name:'屋顶颜色'},
  {cx:205,cy:143,r:22,name:'烟囱烟雾'},
  {cx:112,cy:268,r:26,name:'花朵颜色'},
  {cx:58, cy:148,r:24,name:'树上小鸟'},
  {cx:262,cy:218,r:22,name:'窗户亮灯'},
 ],
 draw(ctx,R){
  ctx.clearRect(0,0,W,H);
  // sky
  const sky=ctx.createLinearGradient(0,0,0,H*.68);
  sky.addColorStop(0,'#050a18'); sky.addColorStop(.6,'#0e1a38'); sky.addColorStop(1,'#1a2e52');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H*.68);
  stars(ctx,7654,55,H*.65);
  // [d0] moon
  if(!R){
    // crescent
    ctx.save(); ctx.fillStyle='#fffbcc';
    ctx.beginPath(); ctx.arc(388,52,26,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0e1a38'; ctx.beginPath(); ctx.arc(400,48,22,0,Math.PI*2); ctx.fill();
    ctx.restore();
  } else {

/* ═══════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════ */
let currentLvlIdx=0;
let activeDiffs=[];
let score=0,found=0,timeLeft=0;
let gameTimer=null;
let hintCount=3;
let ringAnims=[], wrongAnims=[], hintAnim=null;
let hintCooldown=false;

/* ═══════════════════════════════════════════
   LEVEL SELECT
═══════════════════════════════════════════ */
function buildLevelSelect(){
  const grid=document.getElementById('levelGrid');
  grid.innerHTML='';
  LEVELS.forEach((lv,i)=>{
    const best=localStorage.getItem('best_'+lv.id)||0;
    const stars='⭐'.repeat(lv.difficulty)+'☆'.repeat(5-lv.difficulty);
    const card=document.createElement('div');
    card.className='levelCard';
    card.innerHTML=`
      <span class="cIcon">${lv.icon}</span>
      <div class="cNum">第 ${lv.id} 关</div>
      <div class="cName">${lv.name}</div>
      <div class="cInfo">${lv.diffs.length} 处差异 · ${lv.timeLimit}s</div>
      <div class="cStars">${stars}</div>
      <div class="cBest">${best>0?'最高 '+best+' 分':''}</div>`;
    card.onclick=()=>startLevel(i);
    grid.appendChild(card);
  });
}

function backToSelect(){
  if(gameTimer){ clearInterval(gameTimer); gameTimer=null; }
  document.getElementById('overlay').className='';
  document.getElementById('screenGame').style.display='none';
  document.getElementById('screenSelect').style.display='flex';
  buildLevelSelect();
}

/* ═══════════════════════════════════════════
   START LEVEL
═══════════════════════════════════════════ */
function startLevel(idx){
  currentLvlIdx=idx;
  const lv=LEVELS[idx];
  // deep-copy diffs
  activeDiffs=lv.diffs.map(d=>({...d,found:false}));
  score=0; found=0; timeLeft=lv.timeLimit; hintCount=3; hintCooldown=false;
  ringAnims=[]; wrongAnims=[]; hintAnim=null;
  if(gameTimer) clearInterval(gameTimer);
  // UI
  document.getElementById('screenSelect').style.display='none';
  document.getElementById('screenGame').style.display='flex';
  document.getElementById('overlay').className='';
  document.getElementById('gameTitle').textContent=lv.icon+' '+lv.name;
  document.getElementById('hudLvl').textContent=lv.id+'/'+LEVELS.length;
  document.getElementById('fc').textContent=0;
  document.getElementById('ft').textContent=lv.diffs.length;
  document.getElementById('tm').textContent=timeLeft;
  document.getElementById('tm').style.color='#ffd700';
  document.getElementById('sc').textContent=0;
  document.getElementById('hintLeft').textContent=hintCount;
  document.getElementById('btnHint').disabled=false;
  // dots
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML='';
  activeDiffs.forEach(()=>{ const d=document.createElement('div'); d.className='dot'; dotsEl.appendChild(d); });
  // timer
  gameTimer=setInterval(()=>{
    timeLeft--;
    document.getElementById('tm').textContent=timeLeft;
    if(timeLeft<=10) document.getElementById('tm').style.color='#ef4444';
    if(timeLeft<=0){ clearInterval(gameTimer); gameTimer=null; endGame(false); }
  },1000);
  renderAll();
}

/* ═══════════════════════════════════════════
   HINT
═══════════════════════════════════════════ */
function useHint(){
  if(hintCooldown||hintCount<=0) return;
  const unfound=activeDiffs.find(d=>!d.found);
  if(!unfound) return;
  hintCount--;
  document.getElementById('hintLeft').textContent=hintCount;
  if(hintCount===0) document.getElementById('btnHint').disabled=true;
  hintAnim={cx:unfound.cx,cy:unfound.cy,r:unfound.r,age:0,maxAge:90};
  hintCooldown=true;
  showTip('💡 提示：注意【'+unfound.name+'】的位置');
  setTimeout(()=>{ hintCooldown=false; },3500);
}

/* ═══════════════════════════════════════════
   CLICK
═══════════════════════════════════════════ */
function handleClick(e,isRight){
  if(found>=activeDiffs.length) return;
  const canvas=isRight?CR:CL;
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
  const mx=(e.clientX-rect.left)*scaleX, my=(e.clientY-rect.top)*scaleY;
  let hit=false;
  for(const d of activeDiffs){
    if(Math.hypot(mx-d.cx,my-d.cy)<=d.r){
      if(d.found){ showTip('这里已经找到啦 ~'); }
      else{
        d.found=true; found++;
        score+=Math.max(15,Math.floor(timeLeft/4));
        document.getElementById('fc').textContent=found;
        document.getElementById('sc').textContent=score;
        showTip('✅ 找到了！【'+d.name+'】');
        ringAnims.push({cx:d.cx,cy:d.cy,r:d.r,age:0,right:false});
        ringAnims.push({cx:d.cx,cy:d.cy,r:d.r,age:0,right:true});
        refreshDots();
        if(found>=activeDiffs.length) setTimeout(()=>endGame(true),600);
      }
      hit=true; break;
    }
  }
  if(!hit){
    wrongAnims.push({cx:mx,cy:my,age:0,right:isRight});
    showTip('❌ 这里没有差异，再仔细看看！');
  }
}
CL.addEventListener('click',e=>handleClick(e,false));
CR.addEventListener('click',e=>handleClick(e,true));
CL.addEventListener('touchstart',e=>{ e.preventDefault(); if(e.touches.length) handleClick(e.touches[0],false); },{passive:false});
CR.addEventListener('touchstart',e=>{ e.preventDefault(); if(e.touches.length) handleClick(e.touches[0],true); },{passive:false});

/* ═══════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════ */
let rafId=null;
function renderAll(){
  if(rafId) cancelAnimationFrame(rafId);
  const lv=LEVELS[currentLvlIdx];
  [ctxL,ctxR].forEach((ctx,idx)=>{
    const isRight=idx===1;
    lv.draw(ctx,isRight);
    // found circles
    activeDiffs.forEach(d=>{
      if(!d.found) return;
      ctx.save(); ctx.strokeStyle='#4ecca3'; ctx.lineWidth=3; ctx.setLineDash([6,4]);
      ctx.beginPath(); ctx.arc(d.cx,d.cy,d.r,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]); ctx.restore();
    });
    // hint pulse
    if(hintAnim){
      const p=hintAnim.age/hintAnim.maxAge;
      const pulse=Math.sin(hintAnim.age*.18)*0.5+0.5;
      ctx.save(); ctx.globalAlpha=pulse*.65; ctx.strokeStyle='#ffe84d'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(hintAnim.cx,hintAnim.cy,hintAnim.r+pulse*6,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=pulse*.15; ctx.fillStyle='#ffe84d';
      ctx.beginPath(); ctx.arc(hintAnim.cx,hintAnim.cy,hintAnim.r,0,Math.PI*2); ctx.fill();
      ctx.restore();
    }
    // ring anims
    ringAnims.filter(a=>a.right===isRight).forEach(a=>{
      const p=a.age/40;
      ctx.save(); ctx.globalAlpha=Math.max(0,1-p); ctx.strokeStyle='#4ecca3'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(a.cx,a.cy,a.r+p*20,0,Math.PI*2); ctx.stroke(); ctx.restore();
    });
    // wrong anims
    wrongAnims.filter(a=>a.right===isRight).forEach(a=>{
      const alpha=Math.max(0,1-a.age/28);
      ctx.save(); ctx.globalAlpha=alpha; ctx.strokeStyle='#ef4444'; ctx.lineWidth=2.5; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(a.cx-11,a.cy-11); ctx.lineTo(a.cx+11,a.cy+11); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(a.cx+11,a.cy-11); ctx.lineTo(a.cx-11,a.cy+11); ctx.stroke();
      ctx.restore();
    });
  });
  ringAnims.forEach(a=>a.age++); wrongAnims.forEach(a=>a.age++);
  ringAnims=ringAnims.filter(a=>a.age<=40);
  wrongAnims=wrongAnims.filter(a=>a.age<=28);
  if(hintAnim){ hintAnim.age++; if(hintAnim.age>=hintAnim.maxAge) hintAnim=null; }
  rafId=requestAnimationFrame(renderAll);
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
let tipTimer;
function showTip(msg){
  const el=document.getElementById('tip'); el.textContent=msg;
  clearTimeout(tipTimer);
  tipTimer=setTimeout(()=>el.textContent='点击任意一张图的不同之处',2800);
}
function refreshDots(){
  document.querySelectorAll('.dot').forEach((d,i)=>d.className='dot'+(activeDiffs[i]?.found?' ok':''));
}

function endGame(win){
  if(gameTimer){ clearInterval(gameTimer); gameTimer=null; }
  const lv=LEVELS[currentLvlIdx];
  if(win){
    const bonus=timeLeft*5;
    score+=bonus;
    document.getElementById('sc').textContent=score;
    const prev=+(localStorage.getItem('best_'+lv.id)||0);
    if(score>prev) localStorage.setItem('best_'+lv.id,score);
  }
  document.getElementById('oTitle').textContent=win?'🎉 全部找到！':'⏰ 时间到！';
  document.getElementById('oMsg').textContent=win
    ?`用时 ${lv.timeLimit-timeLeft} 秒，得 ${score} 分！时间奖励 +${timeLeft*5}`
    :`找到了 ${found}/${lv.diffs.length} 处，得 ${score} 分，再试一次吧！`;
  const isLast=currentLvlIdx>=LEVELS.length-1;
  document.getElementById('btnNextLvl').style.display=isLast?'none':'';
  document.getElementById('overlay').className='on';
}

function goNext(){
  if(currentLvlIdx<LEVELS.length-1) startLevel(currentLvlIdx+1);
}

/* ═══════════════════════════════════════════
   RESPONSIVE CANVAS SIZING
═══════════════════════════════════════════ */
function resizeCanvases(){
  const vw=window.innerWidth;
  if(vw>600){
    // 桌面端：左右并排
    const maxW=Math.min(460,Math.floor(vw/2)-20);
    const ch=Math.round(maxW*320/460);
    [CL,CR].forEach(c=>{ c.style.width=maxW+'px'; c.style.height=ch+'px'; });
  } else {
    // 移动端：全宽，高度按比例自动跟随 CSS width:100%
    // 只需设置 height，width 由 CSS 100% 控制
    const cw=vw;
    const ch=Math.round(cw*320/460);
    [CL,CR].forEach(c=>{ c.style.height=ch+'px'; });
  }
}
window.addEventListener('resize',resizeCanvases);

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
resizeCanvases();
buildLevelSelect();
</script>
